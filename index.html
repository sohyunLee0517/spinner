<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>네온 스피너</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="app">
      <header class="header">
        <h1>네온 스피너</h1>
        <p class="tagline">모양을 고르고, 날마다 색을 입히고, 돌려보세요.</p>
      </header>

      <main class="main">
        <section class="panel wheel-panel">
          <div class="wheel-wrap">
            <canvas
              id="wheel"
              width="420"
              height="420"
              aria-label="스피너 휠"
            ></canvas>
            <button
              type="button"
              class="btn spin-btn spin-btn--hub"
              id="spinBtn"
              aria-label="돌리기"
            ></button>
          </div>
          <p class="wheel-hint">스피너 가운데를 누르면 돌아가요.</p>
        </section>

        <section class="panel controls">
          <h2>스피너 모양</h2>
          <label class="field">
            <span class="label">프리셋 (참고 시트 A–P · 16종)</span>
            <select id="shapeSelect"></select>
          </label>
          <p class="hint" id="shapeHint"></p>

          <h2>추(끝 동그라미) 테두리 색</h2>
          <div class="segment-tools">
            <button type="button" class="btn ghost" id="randomColors">
              랜덤 네온
            </button>
            <button type="button" class="btn ghost" id="equalSplit">
              색 균등 분배
            </button>
          </div>
          <div class="color-list" id="colorList"></div>
        </section>
      </main>

      <footer class="footer">
        <span>몸통 메탈톤 · 각 추 베어링 테두리만 네온</span>
      </footer>
    </div>
    <script src="app.js"></script>
  </body>
</html>
